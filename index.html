<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Remover - AI 图片背景移除</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤍 Image Background Remover</h1>
            <p class="subtitle">AI 智能抠图 · 一键移除背景 · 透明 PNG 输出</p>
        </header>

        <main>
            <!-- 上传区域 -->
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <h3>拖拽图片到此处上传</h3>
                <p>或点击选择文件</p>
                <p class="hint">支持 JPG/PNG 格式，最大 32MB</p>
                <input type="file" id="fileInput" accept="image/png,image/jpeg" hidden>
            </div>

            <!-- 处理状态 -->
            <div class="processing" id="processing" style="display: none;">
                <div class="spinner"></div>
                <p>正在处理中，请稍候...</p>
            </div>

            <!-- 错误提示 -->
            <div class="error" id="error" style="display: none;">
                <div class="error-icon">⚠️</div>
                <p id="errorMessage">处理失败</p>
                <button onclick="resetApp()">重新上传</button>
            </div>

            <!-- 预览区域 -->
            <div class="preview" id="preview" style="display: none;">
                <div class="preview-group">
                    <h4>处理前</h4>
                    <div class="image-wrapper">
                        <img id="originalImage" alt="原图">
                    </div>
                </div>

                <div class="preview-group">
                    <h4>处理后</h4>
                    <div class="image-wrapper transparent-bg">
                        <img id="processedImage" alt="抠图后">
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-primary" onclick="downloadImage()">⬇️ 下载 PNG</button>
                    <button class="btn-secondary" onclick="resetApp()">🔄 再处理一张</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by Remove.bg API | Cloudflare Pages</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
